name: CI

on:
  - push

jobs:
  pipeline:
    name: pipeline
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
      - name: Build
        run: make build
      - name: Test
        run: make test
      - uses: codecov/codecov-action@v5
